name: Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: pip install -r backend/requirements.txt httpx pytest

      - name: Run unit tests
        working-directory: backend
        run: pytest tests/test_icae.py -v --tb=short

      - name: Run API integration tests
        working-directory: backend
        run: pytest tests/test_api.py -v --tb=short
