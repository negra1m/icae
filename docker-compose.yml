services:
  backend:
    build: ./backend
    ports:
      - "8000:8000"
    healthcheck:
      test: ["CMD", "python", "-c", "import httpx; httpx.get('http://localhost:8000').raise_for_status()"]
      interval: 30s
      timeout: 10s
      retries: 3
    networks:
      - icae-net

  frontend:
    build: ./frontend
    ports:
      - "3000:80"
    depends_on:
      backend:
        condition: service_healthy
    networks:
      - icae-net

networks:
  icae-net:
    driver: bridge
