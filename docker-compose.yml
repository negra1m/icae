services:
  backend:
    build: ./backend
    ports:
      - "8000:8000"
    env_file:
      - .env
    healthcheck:
      test: ["CMD", "python", "-c", "import httpx; httpx.get('http://localhost:8000').raise_for_status()"]
      interval: 30s
      timeout: 10s
      retries: 3
    networks:
      - icae-net

  frontend:
    build: ./frontend
    ports:
      - "3000:80"
    depends_on:
      backend:
        condition: service_healthy
    networks:
      - icae-net

  dashboard:
    build: ./backend
    command: ["streamlit", "run", "dashboard/app.py", "--server.port=8501", "--server.address=0.0.0.0"]
    ports:
      - "8501:8501"
    env_file:
      - .env
    depends_on:
      backend:
        condition: service_healthy
    networks:
      - icae-net

networks:
  icae-net:
    driver: bridge
